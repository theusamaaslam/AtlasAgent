name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'skills/**'
      - 'optional-skills/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:
    inputs:
      rebuild_skills_index:
        description: 'Force a fresh skills-index rebuild before deploying'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'theusamaaslam/AtlasAgent'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Python build helpers
        run: pip install pyyaml==6.0.2 httpx==0.28.1

      - name: Prepare skills index
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          REBUILD_SKILLS_INDEX: ${{ github.event.inputs.rebuild_skills_index || 'false' }}
        run: |
          set -euo pipefail
          INDEX_PATH="website/static/api/skills-index.json"
          mkdir -p "$(dirname "$INDEX_PATH")"

          validate_index() {
            python3 - "$INDEX_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"invalid skills index JSON: {exc}", file=sys.stderr)
              sys.exit(1)
          skills = data.get("skills")
          if not isinstance(skills, list) or len(skills) < 1500:
              count = len(skills) if isinstance(skills, list) else "missing"
              print(f"skills index too small: {count}", file=sys.stderr)
              sys.exit(1)
          print(f"skills index ready: {len(skills)} skills")
          PY
          }

          if [ "$REBUILD_SKILLS_INDEX" = "true" ] || ! validate_index; then
            rm -f "$INDEX_PATH"
            python3 scripts/build_skills_index.py
            validate_index
          fi

      - name: Extract skill metadata for dashboard
        run: python3 website/scripts/extract-skills.py

      - name: Regenerate per-skill docs pages and catalogs
        run: python3 website/scripts/generate-skill-docs.py

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Docusaurus
        run: npm run build
        working-directory: website

      - name: Stage deployment
        run: |
          mkdir -p _site
          cp -r website/build/* _site/
          if [ -f website/build/llms.txt ]; then
            cp website/build/llms.txt _site/llms.txt
          fi
          if [ -f website/build/llms-full.txt ]; then
            cp website/build/llms-full.txt _site/llms-full.txt
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
