name: Docker Build and Test (Manual)

# Atlas currently has no public container registry image. Keep container
# verification available to maintainers without running or publishing it on
# every PR, main push, or release.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-manual-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: atlas-agent:ci

jobs:
  build-and-test:
    if: github.repository == 'theusamaaslam/AtlasAgent'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build local image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            ATLAS_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=docker-manual-amd64
          cache-to: type=gha,mode=max,scope=docker-manual-amd64

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install test dependencies
        run: uv sync --locked --python 3.11 --extra dev

      - name: Run Docker integration tests
        env:
          ATLAS_TEST_IMAGE: ${{ env.IMAGE_NAME }}
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
        run: scripts/run_tests.sh tests/docker/ --file-timeout 600
